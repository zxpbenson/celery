# Redis 开发环境配置

# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 守护进程模式
daemonize no

# 日志级别
loglevel notice

# 日志文件
logfile /var/log/redis/redis.log

# 数据库数量
databases 16

# 持久化配置 - RDB
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# 数据目录
dir /data

# 持久化配置 - AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 最大内存
maxmemory 256mb
maxmemory-policy allkeys-lru

# 连接密码 (开发环境可注释掉)
# requirepass your_password