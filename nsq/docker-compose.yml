version: '3.8'

services:
  nsqlookupd:
    image: nsqio/nsq:v1.3.0
    command: /nsqlookupd
    ports:
      - "4160:4160"
      - "4161:4161"
    volumes:
      - ./data/nsqlookupd:/data
      - ./logs/nsqlookupd:/var/log/nsq
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - nsq-network

  nsqd:
    image: nsqio/nsq:v1.3.0
    command: /nsqd --lookupd-tcp-address=nsqlookupd:4160
    ports:
      - "4150:4150"
      - "4151:4151"
    volumes:
      - ./data/nsqd:/data
      - ./logs/nsqd:/var/log/nsq
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    depends_on:
      - nsqlookupd
    networks:
      - nsq-network

  nsqadmin:
    image: nsqio/nsq:v1.3.0
    command: /nsqadmin --lookupd-http-address=nsqlookupd:4161
    ports:
      - "4171:4171"
    volumes:
      - ./logs/nsqadmin:/var/log/nsq
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    depends_on:
      - nsqlookupd
    networks:
      - nsq-network

networks:
  nsq-network:
    driver: bridge