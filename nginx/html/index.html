<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Nginx</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .info {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .info h2 {
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .info ul {
            list-style: none;
            text-align: left;
        }
        .info li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .info li:last-child {
            border-bottom: none;
        }
        .status {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Nginx 开发环境</h1>
        <p>您的 Nginx 服务已成功启动！</p>
        
        <div class="info">
            <h2><span class="status"></span>服务状态</h2>
            <ul>
                <li><strong>服务:</strong> Nginx</li>
                <li><strong>版本:</strong> Alpine</li>
                <li><strong>端口:</strong> 80, 443</li>
                <li><strong>状态:</strong> 运行中</li>
            </ul>
        </div>
        
        <div class="info" style="margin-top: 20px;">
            <h2>📁 目录说明</h2>
            <ul>
                <li><strong>静态文件:</strong> ./html/</li>
                <li><strong>配置文件:</strong> ./conf/</li>
                <li><strong>日志文件:</strong> ./logs/</li>
                <li><strong>SSL证书:</strong> ./certs/</li>
            </ul>
        </div>
    </div>
</body>
</html>
