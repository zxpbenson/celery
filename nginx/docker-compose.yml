version: '3.8'

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.14.0
    ports:
      - "80:80"      # HTTP 流量
      - "443:443"    # HTTPS 流量
      - "81:81"      # 管理界面
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - nginx-network

networks:
  nginx-network:
    driver: bridge